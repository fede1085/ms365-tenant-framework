id: "@SYS-ENT-002"
title: "Workload Entity Extension Map"
layer: "SYS"
type: "Entity Map"
status: "Active"
authority_level: 1
depends_on:
  - "@SYS-ENT-001"
  - "@SYS-STD-001"
  - "@SYS-MAP-000"
  - "@CAN-GRP-002"
entities:
  - id: "Team"
    parent: "Group"
    description: "Microsoft Teams collaboration workspace derived from a Microsoft 365 Group."
  - id: "Channel"
    parent: "Team"
    description: "Collaboration subdivision inside a Team."
  - id: "SharePointSite"
    parent: "Team"
    description: "SharePoint site for structured documents, often Team-backed."
  - id: "Library"
    parent: "SharePointSite"
    description: "Document container inside a SharePoint site."
  - id: "GuestUser"
    parent: "Tenant"
    description: "External identity with sponsored and reviewed collaboration access."
  - id: "AccessReview"
    parent: "Governance"
    description: "Governance control for validating access need, ownership, and least privilege."
  - id: "ConditionalAccessPolicy"
    parent: "Security"
    description: "Policy evaluating identity, role, device, location, risk, and workload context."
  - id: "AdminRoleAssignment"
    parent: "Role"
    description: "Privileged role assignment distinct from business Role and technical Permission."
  - id: "SensitivityLabel"
    parent: "InformationProtection"
    description: "Classification and protection marker for information or containers."
  - id: "RetentionPolicy"
    parent: "InformationProtection"
    description: "Rule defining information retention, review, or disposal expectations."
  - id: "SectorTemplate"
    parent: "Strategy"
    description: "Controlled business-type variation profile."
  - id: "MaturityLevel"
    parent: "Strategy"
    description: "Controlled scope filter, not a framework layer."
relationship_chains:
  collaboration: "Tenant -> Department -> Group -> Team -> Channel/SharePointSite -> Library"
  policy: "User/Group/AdminRoleAssignment/GuestUser -> ConditionalAccessPolicy"
  review: "Group/Team/SharedMailbox/GuestUser/AdminRoleAssignment -> AccessReview"
  strategy: "SectorTemplate/MaturityLevel -> Blueprint scope guidance"
