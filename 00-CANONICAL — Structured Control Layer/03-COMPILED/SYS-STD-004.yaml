id: "@SYS-STD-004"
title: "Sector Template Vocabulary"
layer: "SYS"
type: "Standard"
status: "Active"
authority_level: 1
depends_on:
  - "@SYS-STD-001"
  - "@SYS-STD-002"
  - "@SYS-MAP-000"
  - "@ARC-STR-002"
terms:
  - id: "SectorTemplate"
    definition: "Reusable semantic variation profile for a business type; parametrizes the framework."
  - id: "Logistics"
    definition: "Logistics, transport, warehouse, dispatch, and operational coordination scenarios."
  - id: "Consulting"
    definition: "Advisory, professional services, and client project organizations."
  - id: "Legal"
    definition: "Legal service environments with matter-based confidentiality and retention emphasis."
  - id: "Healthcare"
    definition: "Clinical, care, or health service environments with sensitive data emphasis."
  - id: "Administrative Services"
    definition: "Back-office, administration, accounting support, and process-heavy organizations."
  - id: "General Services"
    definition: "Service companies with support, operations, sales, and field/service coordination."
relationship_chain: "SectorTemplate -> Business scenario -> Department defaults -> Role defaults -> Collaboration defaults -> Governance emphasis -> Blueprint guidance -> Matrix generation constraints"
